<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waifu</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">
</head>

<body>
    <div id="wrapper">
        <div class="container text-center">
            <div id="target-section" class="row">
                <div class="col-3"></div>
                <div class="col-3"></div>
                <div class="col-3"></div>
                <div class="col-3"></div>
                <!-- <div class="col">
                Column
              </div> -->

            </div>
        </div>

    </div>

    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-A3rJD856KowSb7dwlZdYEkO39Gagi7vIsF0jrRAoQmDKKtQBHUuLZ9AsSv4jD4Xa"
        crossorigin="anonymous"></script>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <script>
        var getData = function(url){
            var res = axios.get(url)
            return res
        }

        // var targeDiv = document.getElementById('target-section')
        var colDiv = document.getElementsByClassName('col-3')

        for(let ii=0; ii<100; ii++){
            getData('https://api.waifu.im/random/')
            .then(function(response){
                var imgUrl = response.data.images[0].url
                console.log(imgUrl)

                var imgRender = document.createElement('img')
                imgRender.setAttribute('src', imgUrl)
                imgRender.setAttribute('class', 'card-img-top')

                var cardRender = document.createElement('div')
                cardRender.setAttribute('class', 'card mt-4')
                cardRender.append(imgRender)

                // var colRender = document.createElement('div')
                // colRender.setAttribute('class', 'col-3')
                // colRender.append(cardRender)

                // targeDiv.append(colRender)

                if(ii % 4 === 0){
                    colDiv[0].append(cardRender)
                } else if(ii % 4 === 1) {
                    colDiv[1].append(cardRender)
                } else if(ii % 4 === 2) {
                    colDiv[2].append(cardRender)
                } else {
                    colDiv[3].append(cardRender)
                }
            })
        }
    </script>
</body>

</html>
