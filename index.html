    <script>
        var getData = function (url) {
            return axios.get(url)
        }

        var poemUrl = 'https://v1.hitokoto.cn/?c=i'

        var poem = document.getElementById('poem')

        getData(poemUrl).then(function (res) {
            // console.log(res)
            var hitokoto = res.data.hitokoto
            var poemNode = document.createTextNode(hitokoto)
            var poemRender = document.createElement('p')
            poemRender.append(poemNode)
            poem.append(poemRender)
        })

        poem.onclick = function () {
            getData(poemUrl).then(function (res) {
                // console.log(res)
                var hitokoto = res.data.hitokoto
                var poemNode = document.createTextNode(hitokoto)
                var poemRender = document.createElement('p')
                poemRender.append(poemNode)
                poem.innerHTML = ''
                poem.append(poemRender)
            })
        }



        axios.get('https://api.gitrows.com/@github/ibenzhou/startpage/car.json')
            .then(function (response) {
                console.log(response)
            })


    </script>
